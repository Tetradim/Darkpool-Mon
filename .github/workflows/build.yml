name: Build Darkpool Monitor

on:
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - 'requirements.txt'
      - 'package.json'
      - 'src/**'
      - 'index.html'
      - 'vite.config.js'
      - 'Launch-Darkpool-Monitor.bat'
      - 'Launch-Darkpool-Monitor.ps1'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Custom version'
        required: false
        default: ''

env:
  VERSION: ${{ github.event.inputs.version || '1.0.0-beta' }}
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run static tests
        run: python -m unittest discover -s tests -p "*static.py" -v

      - name: Build frontend
        run: |
          Remove-Item frontend-dist -Recurse -Force -ErrorAction SilentlyContinue
          npm install
          npm run build
          Rename-Item dist frontend-dist

      - name: Build exe
        run: |
          Remove-Item build -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "dist\DarkpoolMonitor" -Recurse -Force -ErrorAction SilentlyContinue
          python -m PyInstaller `
            --clean `
            --name DarkpoolMonitor `
            --onedir `
            --console `
            --add-data "frontend-dist;static" `
            --hidden-import uvicorn `
            --hidden-import jwt `
            --hidden-import email_validator `
            --hidden-import dotenv `
            --hidden-import httpx `
            --hidden-import requests `
            --hidden-import pandas `
            --hidden-import numpy `
            --noconfirm `
            windows_entrypoint.py

      - name: Copy launchers into package
        run: |
          $package = "dist\DarkpoolMonitor"
          Copy-Item "Launch-Darkpool-Monitor.bat" -Destination $package -Force
          Copy-Item "Launch-Darkpool-Monitor.ps1" -Destination $package -Force

      - name: Verify package
        run: |
          if (!(Test-Path "dist\DarkpoolMonitor\DarkpoolMonitor.exe")) {
            Write-Host "ERROR: DarkpoolMonitor.exe not found"
            exit 1
          }
          if (!(Test-Path "dist\DarkpoolMonitor\_internal\static\index.html") -and !(Test-Path "dist\DarkpoolMonitor\static\index.html")) {
            Write-Host "ERROR: packaged static index.html not found"
            exit 1
          }

      - name: Create Inno Setup script
        run: |
          $iss = @"
          #define MyAppName "Darkpool Monitor"
          #define MyAppVersion "${{ env.VERSION }}"
          #define MyAppPublisher "Tetradim / SignalForge Lab"
          #define MyAppURL "https://github.com/Tetradim/Darkpool-Mon"
          #define MyAppExeName "DarkpoolMonitor.exe"

          [Setup]
          AppId={{B48C76DA-8E48-44DF-9E86-6C3C128B5E02}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppVerName={#MyAppName} {#MyAppVersion}
          AppPublisher={#MyAppPublisher}
          AppPublisherURL={#MyAppURL}
          AppSupportURL={#MyAppURL}/issues
          AppUpdatesURL={#MyAppURL}/releases
          DefaultDirName={autopf}\{#MyAppName}
          DefaultGroupName={#MyAppName}
          OutputDir=installer-dist
          OutputBaseFilename=DarkpoolMonitor-Setup-{#MyAppVersion}
          UninstallDisplayName={#MyAppName}
          UninstallDisplayIcon={app}\{#MyAppExeName}
          Compression=lzma2
          SolidCompression=yes
          WizardStyle=modern
          MinVersion=10.0.18362
          PrivilegesRequired=admin
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: checkedonce
          Name: "launchapp"; Description: "Launch Darkpool Monitor after install"; GroupDescription: "Startup"; Flags: checkedonce

          [Files]
          Source: "dist\DarkpoolMonitor\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\{#MyAppName}"; Filename: "{app}\Launch-Darkpool-Monitor.bat"; WorkingDir: "{app}"
          Name: "{group}\Uninstall {#MyAppName}"; Filename: "{uninstallexe}"
          Name: "{commondesktop}\{#MyAppName}"; Filename: "{app}\Launch-Darkpool-Monitor.bat"; WorkingDir: "{app}"; Tasks: desktopicon

          [Run]
          Filename: "{app}\Launch-Darkpool-Monitor.bat"; Description: "Launch {#MyAppName}"; Flags: nowait postinstall skipifsilent shellexec; Tasks: launchapp; WorkingDir: "{app}"

          [UninstallDelete]
          Type: filesandordirs; Name: "{app}"
          Type: files; Name: "{userdesktop}\Darkpool-Monitor.log"
          Type: files; Name: "{userdesktop}\Darkpool-Monitor-Transcript.log"

          [Code]
          procedure CurUninstallStepChanged(CurUninstallStep: TUninstallStep);
          var
            ResultCode: Integer;
          begin
            if CurUninstallStep = usUninstall then
            begin
              Exec('taskkill', '/F /IM DarkpoolMonitor.exe', '', SW_HIDE, ewWaitUntilTerminated, ResultCode);
            end;
          end;
          "@
          $iss | Out-File -Encoding ASCII setup.iss

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: setup.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: DarkpoolMonitor-Setup-${{ env.VERSION }}
          path: installer-dist/DarkpoolMonitor-Setup*.exe
          if-no-files-found: error
          retention-days: 90
